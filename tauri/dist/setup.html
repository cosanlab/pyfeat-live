<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' http://127.0.0.1:* http://localhost:*; img-src 'self' data: http://127.0.0.1:* http://localhost:*; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
    <title>Py-feat Live — Setting up</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0; padding: 0; height: 100%; width: 100%;
        background: #0e1117;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                     Helvetica, Arial, sans-serif;
        display: flex; flex-direction: column;
        align-items: stretch;
      }
      header {
        padding: 1.5em 2em 0.6em;
        text-align: center;
      }
      header h1 { margin: 0; font-size: 1.4em; font-weight: 500; }
      header p { margin: 0.4em 0 0; opacity: 0.6; font-size: 0.9em; }
      .spinner {
        width: 16px; height: 16px;
        border: 2px solid #444;
        border-top-color: #0f9d58;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 0.6em;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #log {
        flex: 1; min-height: 0;
        margin: 0.6em 1.2em 1.2em;
        padding: 1em;
        background: #181c24;
        border: 1px solid #2a2e3a;
        border-radius: 6px;
        font-family: ui-monospace, "SF Mono", "Fira Code", Menlo, monospace;
        font-size: 0.78em;
        line-height: 1.4;
        color: #cfd3da;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .stderr { color: #ffb37c; }
      .err {
        color: #ff7c7c;
        padding: 0.8em 1.2em;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><span class="spinner" id="spin"></span><span id="status">Preparing runtime…</span></h1>
      <p id="hint">First-run install — Python and ML libraries (~1.5GB). Subsequent launches will be instant.</p>
    </header>
    <pre id="log"></pre>

    <script>
      // Port comes from the URL fragment the Rust shell appends
      // (setup.html#8501). Polling on this URL begins immediately
      // and is independent of bootstrap events — that way we don't
      // race the page-load against `bootstrap://done` (which fires
      // in <100ms on subsequent launches when no install is needed).
      const port = parseInt(location.hash.slice(1), 10) || 8501;
      const target = `http://127.0.0.1:${port}`;
      const log = document.getElementById("log");
      const status = document.getElementById("status");
      const hint = document.getElementById("hint");
      const spin = document.getElementById("spin");

      function append(stream, line) {
        const span = document.createElement("span");
        if (stream === "stderr") span.className = "stderr";
        span.textContent = line + "\n";
        log.appendChild(span);
        log.scrollTop = log.scrollHeight;
      }

      // Subscribe to Rust-side bootstrap events for log streaming and
      // status updates — but only if the global Tauri API is present.
      // We tolerate it being unavailable so the redirect path keeps
      // working even if `withGlobalTauri` is misconfigured. Health
      // polling below is the actual source of truth for "is streamlit
      // up?".
      if (window.__TAURI__ && window.__TAURI__.event) {
        const { event } = window.__TAURI__;
        event.listen("bootstrap://log", (e) => {
          append(e.payload.stream, e.payload.line);
        });
        event.listen("bootstrap://done", () => {
          status.textContent = "Starting Py-feat Live…";
          hint.textContent = "Loading models — this takes 10–20s on first launch.";
        });
        event.listen("bootstrap://error", (e) => {
          spin.style.display = "none";
          status.textContent = "Setup failed";
          hint.textContent = "See the log below; you may need internet access for the first run.";
          const div = document.createElement("div");
          div.className = "err";
          div.textContent = String(e.payload);
          document.body.appendChild(div);
        });
      }

      // Poll streamlit's health endpoint independently of the events.
      // First success redirects; this works whether the bootstrap was
      // skipped (warm install) or completed (cold install) or never
      // emitted events at all.
      let attempts = 0;
      async function poll() {
        attempts += 1;
        try {
          const r = await fetch(`${target}/_stcore/health`, { cache: "no-store" });
          if (r.ok) {
            status.textContent = "Ready";
            spin.style.display = "none";
            location.replace(target);
            return;
          }
        } catch (_) {
          // ECONNREFUSED while streamlit is still booting — keep polling.
        }
        // After ~30s (60 attempts at 500ms) start surfacing the
        // failure inline so the user sees something is wrong.
        if (attempts === 60) {
          append("stderr", `streamlit not responding at ${target} after 30s`);
          hint.textContent = "Still waiting for the runtime — check the log below.";
        }
        setTimeout(poll, 500);
      }
      poll();
    </script>
  </body>
</html>
