name: CI

# Validates every PR into main before it can merge. Single job, on macOS:
#   1. build the frontend (Svelte/Vite) — this also writes tauri/dist, which
#      tauri-build's build script requires for the cargo check below.
#   2. cargo check the Tauri crate (macOS runner is required — the crate has
#      macOS-only deps: objc2-app-kit, the WKWebView delegate).
# Toolchain pins (pnpm 9 / node 20 / stable rust) + plain `pnpm install` match
# release.yml, so a green CI run mirrors the versions the release build uses.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: install rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri
      - name: build frontend (also produces tauri/dist for tauri-build)
        working-directory: frontend
        run: pnpm install && pnpm build
      - name: type-check (svelte-check)
        # Non-blocking for now: svelte-check fails on a pre-existing missing type
        # declaration for the vendored ../vendor/ogl.js. Surfaced but not gating;
        # add the decl, then drop continue-on-error to make it a gate.
        working-directory: frontend
        continue-on-error: true
        run: pnpm check
      - name: cargo check
        working-directory: tauri/src-tauri
        run: cargo check --locked
