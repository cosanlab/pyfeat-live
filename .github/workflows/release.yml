# Cross-platform release pipeline for Py-feat Live (Tauri shell + uv-on-first-run runtime).
#
# Trigger: push of a `v*` tag (e.g. `v1.0.0` or `v1.2.0-beta.3`).
# Output: a GitHub Release with platform installers attached and a
#         `latest.json` updater manifest signed with the Tauri private
#         key (matching the public key embedded in tauri.conf.json).
#         The desktop app's auto-updater polls the same `latest.json`.
#
# Required GHA secrets (set with tauri/setup-apple-secrets.sh):
#   TAURI_SIGNING_PRIVATE_KEY          base64 of the .key file produced by
#                                      `tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD password used at key generation time
#   APPLE_CERTIFICATE                  base64 of the Developer ID Application
#                                      .p12 export
#   APPLE_CERTIFICATE_PASSWORD         password used to export the .p12
#   APPLE_SIGNING_IDENTITY             "Developer ID Application: Name (TEAMID)"
#   APPLE_TEAM_ID                      10-char Apple Developer Team ID
#   APPLE_API_KEY                      App Store Connect API key ID (10 chars)
#   APPLE_API_ISSUER                  App Store Connect issuer UUID
#   APPLE_API_KEY_BASE64               base64 of the AuthKey_*.p8 private key

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist)"
        required: true

# Both jobs upload to the same GitHub Release that tauri-action drafts,
# so we need `contents: write`.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 — primary target. Self-hosted on Apple Silicon
          # GHA-hosted runner; produces .app + .dmg.
          - platform: macos-14
            target: aarch64-apple-darwin
            uv_asset: uv-aarch64-apple-darwin.tar.gz
          # macOS x86_64 — secondary; same Tauri config, different uv
          # binary. Apple Silicon runners can cross-compile via
          # rustup target add.
          - platform: macos-14
            target: x86_64-apple-darwin
            uv_asset: uv-x86_64-apple-darwin.tar.gz
          # Windows x86_64 — TODO: enable once macOS pipeline is green.
          # - platform: windows-2022
          #   target: x86_64-pc-windows-msvc
          #   uv_asset: uv-x86_64-pc-windows-msvc.zip
          # Linux x86_64 — TODO: same.
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   uv_asset: uv-x86_64-unknown-linux-gnu.tar.gz

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # pnpm is needed by the frontend build (beforeBuildCommand runs
      # `pnpm install && pnpm build` in frontend/). It isn't on the runner
      # PATH by default, so install it before the Tauri build.
      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri/package-lock.json

      # Linux dependencies needed by Tauri's WebKitGTK backend.
      - name: install linux deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Pull the per-target uv binary into vendor/ so Tauri's
      # externalBin picks it up. Astral publishes signed releases on
      # GitHub; we pin to a tag here for reproducibility.
      - name: vendor uv
        env:
          UV_VERSION: "0.10.11"  # bump in sync with vendor/uv/README.md
        shell: bash
        run: |
          mkdir -p vendor/uv
          asset="${{ matrix.uv_asset }}"
          target="${{ matrix.target }}"
          url="https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/${asset}"
          echo "downloading $url"
          if [[ "$asset" == *.tar.gz ]]; then
            # The tarball extracts to a directory `uv-<target>/` containing
            # the `uv` binary. Extract to a temp dir and move the binary out
            # to the flat `vendor/uv/uv-<target>` path. (Extracting straight
            # into vendor/uv and then `mv`ing the binary onto the same-named
            # directory collides — "are identical" — and fails the build.)
            tmp="$(mktemp -d)"
            curl -L "$url" | tar -xz -C "$tmp"
            mv "$tmp/uv-${target}/uv" "vendor/uv/uv-${target}"
            rm -rf "$tmp"
          else
            curl -L -o vendor/uv/uv.zip "$url"
            unzip -j vendor/uv/uv.zip uv.exe -d vendor/uv/
            mv "vendor/uv/uv.exe" "vendor/uv/uv-${target}.exe"
            rm vendor/uv/uv.zip
          fi
          ls -la vendor/uv/

      - name: install npm deps
        working-directory: tauri
        run: npm ci

      # Pre-sign the bundled uv with the same Developer ID + hardened
      # runtime + entitlements that the .app will use. Tauri's bundler
      # has a known bug (#11992) where externalBin binaries fail
      # notarization with "invalid signature" if the bundler ends up
      # over-signing or skipping the deep-sign. Pre-signing here puts
      # uv into a known-good signed state before tauri-action runs;
      # the bundler is happy with an already-signed binary.
      #
      # Skipped if APPLE_SIGNING_IDENTITY is unset (forks, PR builds),
      # so the workflow is still useful for ad-hoc test runs without
      # the cert.
      - name: pre-sign uv (macOS)
        if: startsWith(matrix.platform, 'macos') && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          uv_bin="vendor/uv/uv-${{ matrix.target }}"
          if [ ! -f "$uv_bin" ]; then
            echo "uv binary not found at $uv_bin" >&2
            exit 1
          fi
          # tauri-action imports the signing cert into its own keychain, but
          # that step runs AFTER this one — so the Developer ID identity is
          # not yet available here. Import the cert into a throwaway keychain
          # so codesign can find it, then delete it so tauri-action manages
          # its own keychain without an ambiguous duplicate identity.
          kc="$RUNNER_TEMP/presign.keychain-db"
          kcpass="$(openssl rand -base64 16)"
          # Remember the original search list so we can restore it before
          # tauri-action sets up its own keychain.
          orig_list="$(security list-keychains -d user | sed 's/[" ]//g')"
          security create-keychain -p "$kcpass" "$kc"
          security set-keychain-settings -lut 21600 "$kc"
          security unlock-keychain -p "$kcpass" "$kc"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/presign-cert.p12"
          security import "$RUNNER_TEMP/presign-cert.p12" -k "$kc" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign
          # The keychain must be in the search list or set-key-partition-list
          # reports "item could not be found".
          security list-keychains -d user -s "$kc" $orig_list
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$kcpass" "$kc" >/dev/null
          codesign --force --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --keychain "$kc" \
            --options=runtime \
            --entitlements tauri/src-tauri/entitlements.plist \
            "$uv_bin"
          codesign --verify --strict --verbose=2 "$uv_bin"
          echo "uv pre-signed: $uv_bin"
          # Restore the original search list and remove the throwaway keychain.
          security list-keychains -d user -s $orig_list
          security delete-keychain "$kc"
          rm -f "$RUNNER_TEMP/presign-cert.p12"

      # Decode the App Store Connect .p8 private key from a base64 secret
      # into a file on the runner. tauri-action expects APPLE_API_KEY_PATH
      # to point at the .p8 file (not the contents), so we materialise
      # it here just before the build step. The file lives in the
      # tempdir and is gone after the runner shuts down.
      - name: write App Store Connect API key
        if: startsWith(matrix.platform, 'macos') && env.APPLE_API_KEY_BASE64 != ''
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          key_dir="$RUNNER_TEMP/appstoreconnect"
          mkdir -p "$key_dir"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_dir/api_key.p8"
          chmod 600 "$key_dir/api_key.p8"
          echo "APPLE_API_KEY_PATH=$key_dir/api_key.p8" >> "$GITHUB_ENV"

      # tauri-action handles: cargo build, code signing, notarization
      # (macOS), creating the GitHub Release, generating latest.json
      # for the updater, and uploading platform artifacts.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri update signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (only used on macos-* runners).
          # We use the App Store Connect API key path (modern, no
          # app-specific-password tax). APPLE_API_KEY_PATH is set in the
          # previous step from APPLE_API_KEY_BASE64.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # APPLE_API_KEY_PATH is exported by the previous step into GITHUB_ENV
        with:
          projectPath: tauri
          args: --target ${{ matrix.target }}
          # Tag handling: on tag push the action reads the tag name;
          # on workflow_dispatch the input is forwarded.
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Py-feat Live ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            ## Installation

            Download the right artifact for your platform:

            - macOS Apple Silicon: `Py-feat.Live_*_aarch64.dmg`
            - macOS Intel:         `Py-feat.Live_*_x64.dmg`
            - Windows:             `Py-feat.Live_*_x64-setup.exe`  (TODO)
            - Linux:               `py-feat-live_*_amd64.AppImage`  (TODO)

            First launch downloads ~1.5GB of Python dependencies and
            ~1GB of model weights into your user data directory.
            Plan for ~10 minutes on a typical broadband connection.
            Subsequent launches are instant.
          releaseDraft: true
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          # tauri-action's `includeUpdaterJson` silently drops latest.json
          # in our matrix setup ("Signature not found for the updater JSON.
          # Skipping upload..." in the run logs for v0.8.0 and v0.8.1).
          # We assemble it ourselves in the publish job below.
          includeUpdaterJson: false

      # Upload the per-platform .sig produced by tauri-action to the same
      # draft release, and save the same metadata as a workflow artifact
      # so the fan-in publish job can build latest.json from all targets.
      - name: collect updater .sig (macOS)
        if: startsWith(matrix.platform, 'macos') && env.TAURI_SIGNING_PRIVATE_KEY != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          repo="${{ github.repository }}"
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)  arch=aarch64 ; platform_key=darwin-aarch64 ;;
            x86_64-apple-darwin)   arch=x64     ; platform_key=darwin-x86_64 ;;
            *) echo "unknown target ${{ matrix.target }}" >&2 ; exit 1 ;;
          esac
          # tauri-action renames "<ProductName> <ver>.app.tar.gz" to
          # "<ProductName>_<arch>.app.tar.gz" on upload. Mirror that so
          # the .sig sits next to the .tar.gz it signs.
          targz_name="Py-feat.Live_${arch}.app.tar.gz"
          sig_name="${targz_name}.sig"
          src_sig="$(find tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos \
                       -name '*.app.tar.gz.sig' -type f | head -n1)"
          if [ -z "$src_sig" ]; then
            echo "no .sig produced — TAURI_SIGNING_PRIVATE_KEY may be unset" >&2
            exit 1
          fi
          cp "$src_sig" "$sig_name"
          # Upload alongside the .tar.gz that tauri-action already pushed.
          # --clobber is safe: if a previous run uploaded a stale .sig
          # we want the fresh one to win.
          gh release upload "$tag" "$sig_name" --repo "$repo" --clobber

          # Stash platform metadata for the publish job. The .sig
          # contents are inlined into latest.json by the manifest, so
          # we hand the publish job exactly what it needs as JSON.
          base_url="https://github.com/${repo}/releases/download/${tag}"
          mkdir -p platform-sig
          jq -n \
            --arg key "$platform_key" \
            --arg sig "$(cat "$src_sig")" \
            --arg url "${base_url}/${targz_name}" \
            '{key: $key, signature: $sig, url: $url}' \
            > "platform-sig/${platform_key}.json"

      - uses: actions/upload-artifact@v4
        if: startsWith(matrix.platform, 'macos') && env.TAURI_SIGNING_PRIVATE_KEY != ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          name: platform-sig-${{ matrix.target }}
          path: platform-sig/
          retention-days: 7

  # Fan-in: read each platform's signature metadata, assemble
  # latest.json (the manifest Tauri's updater polls), upload it to the
  # same draft release. This runs only if the build matrix produced sig
  # files — fork PR builds without the signing secret skip cleanly.
  publish-updater-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download platform sig metadata
        uses: actions/download-artifact@v4
        with:
          pattern: platform-sig-*
          path: platform-sig
          merge-multiple: true

      - name: assemble + upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          repo="${{ github.repository }}"
          semver="${tag#v}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          shopt -s nullglob
          metadata_files=(platform-sig/*.json)
          if [ ${#metadata_files[@]} -eq 0 ]; then
            echo "no platform sig metadata — nothing to publish" >&2
            exit 0
          fi

          platforms='{}'
          for f in "${metadata_files[@]}"; do
            key="$(jq -r .key "$f")"
            sig="$(jq -r .signature "$f")"
            url="$(jq -r .url "$f")"
            platforms="$(echo "$platforms" | jq \
              --arg k "$key" --arg sig "$sig" --arg url "$url" \
              '. + {($k): {signature: $sig, url: $url}}')"
          done

          jq -n \
            --arg version "$semver" \
            --arg notes "See https://github.com/${repo}/releases/tag/${tag}" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json
          cat latest.json
          gh release upload "$tag" latest.json --repo "$repo" --clobber
