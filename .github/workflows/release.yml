# Cross-platform release pipeline for Py-feat Live (Tauri shell + uv-on-first-run runtime).
#
# Trigger: push of a `v*` tag (e.g. `v1.0.0` or `v1.2.0-beta.3`).
# Output: a GitHub Release with platform installers attached and a
#         `latest.json` updater manifest signed with the Tauri private
#         key (matching the public key embedded in tauri.conf.json).
#         The desktop app's auto-updater polls the same `latest.json`.
#
# Required GHA secrets (set with tauri/setup-apple-secrets.sh):
#   TAURI_SIGNING_PRIVATE_KEY          base64 of the .key file produced by
#                                      `tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD password used at key generation time
#   APPLE_CERTIFICATE                  base64 of the Developer ID Application
#                                      .p12 export
#   APPLE_CERTIFICATE_PASSWORD         password used to export the .p12
#   APPLE_SIGNING_IDENTITY             "Developer ID Application: Name (TEAMID)"
#   APPLE_TEAM_ID                      10-char Apple Developer Team ID
#   APPLE_API_KEY                      App Store Connect API key ID (10 chars)
#   APPLE_API_ISSUER                  App Store Connect issuer UUID
#   APPLE_API_KEY_BASE64               base64 of the AuthKey_*.p8 private key

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist)"
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 — primary target. Self-hosted on Apple Silicon
          # GHA-hosted runner; produces .app + .dmg.
          - platform: macos-14
            target: aarch64-apple-darwin
            uv_asset: uv-aarch64-apple-darwin.tar.gz
          # macOS x86_64 — secondary; same Tauri config, different uv
          # binary. Apple Silicon runners can cross-compile via
          # rustup target add.
          - platform: macos-14
            target: x86_64-apple-darwin
            uv_asset: uv-x86_64-apple-darwin.tar.gz
          # Windows x86_64 — TODO: enable once macOS pipeline is green.
          # - platform: windows-2022
          #   target: x86_64-pc-windows-msvc
          #   uv_asset: uv-x86_64-pc-windows-msvc.zip
          # Linux x86_64 — TODO: same.
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   uv_asset: uv-x86_64-unknown-linux-gnu.tar.gz

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri/package-lock.json

      # Linux dependencies needed by Tauri's WebKitGTK backend.
      - name: install linux deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Pull the per-target uv binary into vendor/ so Tauri's
      # externalBin picks it up. Astral publishes signed releases on
      # GitHub; we pin to a tag here for reproducibility.
      - name: vendor uv
        env:
          UV_VERSION: "0.10.11"  # bump in sync with vendor/uv/README.md
        shell: bash
        run: |
          mkdir -p vendor/uv
          asset="${{ matrix.uv_asset }}"
          target="${{ matrix.target }}"
          url="https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/${asset}"
          echo "downloading $url"
          if [[ "$asset" == *.tar.gz ]]; then
            curl -L "$url" | tar -xz -C vendor/uv/
            mv "vendor/uv/uv-${target}/uv" "vendor/uv/uv-${target}"
            rmdir "vendor/uv/uv-${target}" 2>/dev/null || true
          else
            curl -L -o vendor/uv/uv.zip "$url"
            unzip -j vendor/uv/uv.zip uv.exe -d vendor/uv/
            mv "vendor/uv/uv.exe" "vendor/uv/uv-${target}.exe"
            rm vendor/uv/uv.zip
          fi
          ls -la vendor/uv/

      - name: install npm deps
        working-directory: tauri
        run: npm ci

      # Pre-sign the bundled uv with the same Developer ID + hardened
      # runtime + entitlements that the .app will use. Tauri's bundler
      # has a known bug (#11992) where externalBin binaries fail
      # notarization with "invalid signature" if the bundler ends up
      # over-signing or skipping the deep-sign. Pre-signing here puts
      # uv into a known-good signed state before tauri-action runs;
      # the bundler is happy with an already-signed binary.
      #
      # Skipped if APPLE_SIGNING_IDENTITY is unset (forks, PR builds),
      # so the workflow is still useful for ad-hoc test runs without
      # the cert.
      - name: pre-sign uv (macOS)
        if: startsWith(matrix.platform, 'macos') && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          uv_bin="vendor/uv/uv-${{ matrix.target }}"
          if [ ! -f "$uv_bin" ]; then
            echo "uv binary not found at $uv_bin" >&2
            exit 1
          fi
          codesign --force --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --options=runtime \
            --entitlements tauri/src-tauri/entitlements.plist \
            "$uv_bin"
          codesign --verify --strict --verbose=2 "$uv_bin"
          echo "uv pre-signed: $uv_bin"

      # Decode the App Store Connect .p8 private key from a base64 secret
      # into a file on the runner. tauri-action expects APPLE_API_KEY_PATH
      # to point at the .p8 file (not the contents), so we materialise
      # it here just before the build step. The file lives in the
      # tempdir and is gone after the runner shuts down.
      - name: write App Store Connect API key
        if: startsWith(matrix.platform, 'macos') && env.APPLE_API_KEY_BASE64 != ''
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          key_dir="$RUNNER_TEMP/appstoreconnect"
          mkdir -p "$key_dir"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_dir/api_key.p8"
          chmod 600 "$key_dir/api_key.p8"
          echo "APPLE_API_KEY_PATH=$key_dir/api_key.p8" >> "$GITHUB_ENV"

      # tauri-action handles: cargo build, code signing, notarization
      # (macOS), creating the GitHub Release, generating latest.json
      # for the updater, and uploading platform artifacts.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri update signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (only used on macos-* runners).
          # We use the App Store Connect API key path (modern, no
          # app-specific-password tax). APPLE_API_KEY_PATH is set in the
          # previous step from APPLE_API_KEY_BASE64.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # APPLE_API_KEY_PATH is exported by the previous step into GITHUB_ENV
        with:
          projectPath: tauri
          args: --target ${{ matrix.target }}
          # Tag handling: on tag push the action reads the tag name;
          # on workflow_dispatch the input is forwarded.
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Py-feat Live ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            ## Installation

            Download the right artifact for your platform:

            - macOS Apple Silicon: `Py-feat.Live_*_aarch64.dmg`
            - macOS Intel:         `Py-feat.Live_*_x64.dmg`
            - Windows:             `Py-feat.Live_*_x64-setup.exe`  (TODO)
            - Linux:               `py-feat-live_*_amd64.AppImage`  (TODO)

            First launch downloads ~1.5GB of Python dependencies and
            ~1GB of model weights into your user data directory.
            Plan for ~10 minutes on a typical broadband connection.
            Subsequent launches are instant.
          releaseDraft: true
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          includeUpdaterJson: true
