<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' http://127.0.0.1:* http://localhost:*; img-src 'self' data: http://127.0.0.1:* http://localhost:*; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
    <title>Py-feat Live — Setting up</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0; padding: 0; height: 100%; width: 100%;
        background: #0e1117;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                     Helvetica, Arial, sans-serif;
        display: flex; flex-direction: column;
        align-items: stretch;
      }
      header {
        padding: 1.5em 2em 0.6em;
        text-align: center;
      }
      header h1 { margin: 0; font-size: 1.4em; font-weight: 500; }
      header p { margin: 0.4em 0 0; opacity: 0.6; font-size: 0.9em; }
      .spinner {
        width: 16px; height: 16px;
        border: 2px solid #444;
        border-top-color: #0f9d58;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 0.6em;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #log {
        flex: 1; min-height: 0;
        margin: 0.6em 1.2em 1.2em;
        padding: 1em;
        background: #181c24;
        border: 1px solid #2a2e3a;
        border-radius: 6px;
        font-family: ui-monospace, "SF Mono", "Fira Code", Menlo, monospace;
        font-size: 0.78em;
        line-height: 1.4;
        color: #cfd3da;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .stderr { color: #ffb37c; }
      .err {
        color: #ff7c7c;
        padding: 0.8em 1.2em;
        font-size: 0.9em;
      }
      #update {
        display: none;
        margin: 0 1.2em 0.4em;
        padding: 0.9em 1.1em;
        background: #14271c;
        border: 1px solid #1f7a44;
        border-radius: 8px;
      }
      #update .row { display: flex; align-items: center; gap: 0.8em; flex-wrap: wrap; }
      #update .title { font-weight: 600; font-size: 0.95em; }
      #update .ver { opacity: 0.8; font-size: 0.85em; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      #update .grow { flex: 1; }
      #update button {
        font: inherit; font-size: 0.85em; font-weight: 500;
        padding: 0.45em 0.9em; border-radius: 6px; cursor: pointer;
        border: 1px solid transparent;
      }
      #update .apply { background: #0f9d58; color: #fff; border-color: #0f9d58; }
      #update .apply:disabled { opacity: 0.5; cursor: default; }
      #update .skip { background: transparent; color: #cfd3da; border-color: #3a3f4b; }
      #update .skip:disabled { opacity: 0.4; cursor: default; }
      #update .bar { display: none; height: 6px; margin-top: 0.7em; background: #0b1a12; border-radius: 3px; overflow: hidden; }
      #update .bar > div { height: 100%; width: 0%; background: #0f9d58; transition: width 0.15s linear; }
      #update .pstat { display: none; margin-top: 0.5em; font-size: 0.8em; opacity: 0.85; }
    </style>
  </head>
  <body>
    <header>
      <h1><span class="spinner" id="spin"></span><span id="status">Preparing runtime…</span></h1>
      <p id="hint">First-run install — Python and ML libraries (~1.5GB). Subsequent launches will be instant.</p>
    </header>

    <!-- Auto-update banner. Hidden until the Rust shell reports an
         available update; while shown, it holds the splash→app redirect
         so a fast backend boot can't skip past it. -->
    <div id="update">
      <div class="row">
        <span class="title">Update available</span>
        <span class="ver" id="update-ver"></span>
        <span class="grow"></span>
        <button class="apply" id="update-apply">Update &amp; Restart</button>
        <button class="skip" id="update-skip">Skip for now</button>
      </div>
      <div class="bar" id="update-bar"><div></div></div>
      <div class="pstat" id="update-pstat"></div>
    </div>

    <pre id="log"></pre>

    <script>
      // Port comes from the `bootstrap://done` event the Rust shell emits
      // right before it spawns the sidecar (its payload IS the port). We
      // poll the backend's health endpoint and, on the first success,
      // navigate the webview to the backend origin — the FastAPI server
      // serves the built Svelte SPA at "/" and the "/api" routes, so
      // loading the app from http://127.0.0.1:<port> (rather than the
      // tauri:// scheme) is what makes the SPA's relative fetch("/api/...")
      // calls resolve. Without this redirect the SPA runs under tauri://
      // and every API call throws "The string did not match the expected
      // pattern."
      // 0 is a sentinel meaning "not known yet" — poll() skips the fetch
      // until the event arrives. (location.hash is read once as a legacy
      // fallback in case the shell ever appends one again; normally empty.)
      let port = parseInt(location.hash.slice(1), 10) || 0;
      const originFor = (p) => `http://127.0.0.1:${p}`;
      // Cache-bust the SPA entry document. WKWebView caches the served
      // index.html, so after an in-app update the stale cached document
      // keeps pinning the PREVIOUS hashed JS/CSS and the new frontend never
      // loads (the "UI regression after update" bug). A per-launch token
      // forces a fresh index.html each launch; the hash-named assets it
      // references stay cached by URL, so only the ~0.4 KB document
      // re-downloads.
      const targetFor = (p) => `${originFor(p)}/?v=${Date.now()}`;
      const log = document.getElementById("log");
      const status = document.getElementById("status");
      const hint = document.getElementById("hint");
      const spin = document.getElementById("spin");
      const updateBox = document.getElementById("update");
      const updateVer = document.getElementById("update-ver");
      const updateApply = document.getElementById("update-apply");
      const updateSkip = document.getElementById("update-skip");
      const updateBar = document.getElementById("update-bar");
      const updateBarFill = updateBar.firstElementChild;
      const updatePstat = document.getElementById("update-pstat");

      // Gate the splash→app redirect on the update decision. The backend
      // may go healthy before OR after the update check resolves; we only
      // navigate to the app once the backend is up AND there's no pending
      // update the user hasn't dismissed (and we're not mid-install).
      let backendReady = false;
      let updatePending = false;
      let applying = false;

      function maybeRedirect() {
        if (backendReady && !updatePending && !applying) {
          status.textContent = "Ready";
          spin.style.display = "none";
          location.replace(targetFor(port));
        }
      }

      function append(stream, line) {
        const span = document.createElement("span");
        if (stream === "stderr") span.className = "stderr";
        span.textContent = line + "\n";
        log.appendChild(span);
        log.scrollTop = log.scrollHeight;
      }

      // Stream the Rust-side bootstrap logs / status into the splash when
      // the global Tauri API is available (withGlobalTauri). Tolerated as
      // optional — the health poll below is the source of truth for "ready".
      if (window.__TAURI__ && window.__TAURI__.event) {
        const { event } = window.__TAURI__;
        event.listen("bootstrap://log", (e) => {
          append(e.payload.stream, e.payload.line);
        });
        event.listen("bootstrap://done", (e) => {
          port = Number(e.payload) || port;
          status.textContent = "Starting Py-feat Live…";
          hint.textContent = "Loading models — this takes 10–20s on first launch.";
        });
        event.listen("bootstrap://error", (e) => {
          spin.style.display = "none";
          status.textContent = "Setup failed";
          hint.textContent = "See the log below; you may need internet access for the first run.";
          const div = document.createElement("div");
          div.className = "err";
          div.textContent = String(e.payload);
          document.body.appendChild(div);
          // One-click retry: relaunch the app, which re-runs the runtime
          // bootstrap (venv already installed → just respawns the sidecar).
          if (!document.getElementById("retry-btn")) {
            const retry = document.createElement("button");
            retry.id = "retry-btn";
            retry.className = "apply";
            retry.textContent = "Restart Py-feat Live";
            retry.style.marginTop = "10px";
            retry.onclick = () => {
              retry.disabled = true;
              window.__TAURI__.core.invoke("restart_app");
            };
            document.body.appendChild(retry);
          }
        });

        // --- Auto-updater banner --------------------------------------
        // The Rust shell checks for updates at startup and emits
        // "updater://available" on a hit. We show a banner and hold the
        // redirect (via updatePending) until the user applies or skips.
        const core = window.__TAURI__.core;
        event.listen("updater://available", (e) => {
          const p = e.payload || {};
          updatePending = true;
          updateVer.textContent =
            (p.current_version ? "v" + p.current_version + " → " : "") + "v" + p.version;
          updateBox.style.display = "block";
        });
        event.listen("updater://progress", (e) => {
          const p = e.payload || {};
          updateBar.style.display = "block";
          updatePstat.style.display = "block";
          if (p.total) {
            const pct = Math.min(100, Math.round((p.downloaded / p.total) * 100));
            updateBarFill.style.width = pct + "%";
            updatePstat.textContent = "Downloading… " + pct + "%";
          } else {
            updatePstat.textContent =
              "Downloading… " + Math.round((p.downloaded || 0) / 1048576) + " MB";
          }
        });
        event.listen("updater://installing", () => {
          updateBarFill.style.width = "100%";
          updatePstat.textContent = "Installing… the app will restart.";
        });
        updateApply.onclick = async () => {
          applying = true;
          updateApply.disabled = true;
          updateSkip.disabled = true;
          updatePstat.style.display = "block";
          updatePstat.textContent = "Starting update…";
          try {
            await core.invoke("apply_update");
            // On success the app restarts; execution won't reach here.
          } catch (err) {
            applying = false;
            updateApply.disabled = false;
            updateSkip.disabled = false;
            updatePstat.textContent = "Update failed: " + err;
          }
        };
        updateSkip.onclick = () => {
          updatePending = false;
          updateBox.style.display = "none";
          maybeRedirect();
        };
      }

      // Poll the FastAPI backend's health endpoint, independent of the
      // bootstrap events. First success redirects — works whether the
      // bootstrap was skipped (warm install), completed (cold install), or
      // never emitted events.
      let attempts = 0;
      async function poll() {
        attempts += 1;
        // Port isn't known until the `bootstrap://done` event delivers it
        // (or the legacy hash fallback set it). Skip the fetch — a port-0
        // request would never resolve — and just keep waiting.
        if (port === 0) {
          setTimeout(poll, 500);
          return;
        }
        try {
          // NOTE: fetch from `origin`, not `target` — target carries the
          // ?v= cache-buster, which used to push the path into the query
          // string (the old poll actually fetched the SPA root). Also
          // verify the identity marker: a bare 200 could be any localhost
          // service on this port.
          const r = await fetch(`${originFor(port)}/api/system/health`, { cache: "no-store" });
          const body = r.ok ? await r.json().catch(() => null) : null;
          if (body && body.app === "pyfeatlive") {
            // Backend is up. Redirect now unless we're holding for an
            // update decision — in which case the Skip/Apply handlers
            // drive what happens next. Either way, stop polling.
            backendReady = true;
            if (updatePending || applying) {
              status.textContent = "Ready — update available";
            }
            maybeRedirect();
            return;
          }
        } catch (_) {
          // ECONNREFUSED while the backend is still booting — keep polling.
        }
        if (attempts === 60) {
          append("stderr", `backend not responding at ${targetFor(port)} after 30s`);
          hint.textContent = "Still waiting for the backend — the first start after an install can take a minute while Python warms up.";
        }
        setTimeout(poll, 500);
      }
      poll();
    </script>
  </body>
</html>
